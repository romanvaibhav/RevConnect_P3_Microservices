<div class="auth-container">
  <div class="auth-card">
    <h1 class="auth-title">RevConnect</h1>
    <p class="auth-subtitle">Sign in to your account</p>

    <!-- Role selector -->
    <div class="role-selector">
      <button
        class="role-pill"
        [class.active]="selectedRole === 'USER'"
        (click)="selectedRole = 'USER'"
        type="button">
        <i class="fa-solid fa-user"></i> Personal
      </button>
      <button
        class="role-pill"
        [class.active]="selectedRole === 'CREATOR'"
        (click)="selectedRole = 'CREATOR'"
        type="button">
        <i class="fa-solid fa-star"></i> Creator
      </button>
      <button
        class="role-pill"
        [class.active]="selectedRole === 'BUSINESS'"
        (click)="selectedRole = 'BUSINESS'"
        type="button">
        <i class="fa-solid fa-building"></i> Business
      </button>
    </div>

    <form (ngSubmit)="onSubmit()" class="auth-form">
      <div class="alert alert-error" *ngIf="errorMessage">
        <i class="fa-solid fa-circle-exclamation"></i> {{ errorMessage }}
      </div>
      <div class="alert alert-success" *ngIf="successMessage">
        <i class="fa-solid fa-circle-check"></i> {{ successMessage }}
      </div>

      <div class="form-group">
        <input
          type="text"
          class="form-control"
          placeholder="Email or Username"
          [(ngModel)]="credentials.username"
          name="username"
          required
        />
      </div>

      <div class="form-group">
        <input
          type="password"
          class="form-control"
          placeholder="Password"
          [(ngModel)]="credentials.password"
          name="password"
          required
        />
      </div>

      <button type="submit" class="btn btn-primary btn-block" [disabled]="isLoading">
        <span *ngIf="!isLoading">
          <i class="fa-solid fa-right-to-bracket"></i> Log In
        </span>
        <span *ngIf="isLoading">
          <i class="fa-solid fa-spinner fa-spin"></i> Logging in...
        </span>
      </button>
    </form>

    <div class="auth-footer">
      <p>Don't have an account? <a routerLink="/register">Sign up</a></p>
    </div>
  </div>
</div>
